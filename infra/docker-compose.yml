version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: planora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.backend
    env_file:
      - ../backend/.env.example
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'
volumes:
  db_data:
