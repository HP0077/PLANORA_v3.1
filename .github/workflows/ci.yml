name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'

jobs:
  # ── Backend lint + test ────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_DEBUG: '1'
      USE_SQLITE: '1'
      REDIS_URL: redis://localhost:6379/0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      FRONTEND_ORIGIN: http://localhost:5174

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Run Django checks
        working-directory: backend
        run: python manage.py check --deploy 2>&1 | grep -v "WARNINGS" || true

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: python -m pytest --tb=short -q

  # ── Frontend lint + test + build ───────────────────────────────────────────
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npx vite build

  # ── Docker build smoke test ───────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target backend -t planora-backend .

      - name: Build frontend image
        run: docker build --target frontend-build -t planora-frontend .
